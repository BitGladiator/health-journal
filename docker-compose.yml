version: "3.8"

services:
  server:
    build: ./server
    container_name: healthjournal_server
    ports:
      - "5500:5500"
    environment:
      - PORT=5500
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  client:
    build: ./client
    container_name: healthjournal_client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5500
    volumes:
      - ./client:/app
      - /app/node_modules
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: healthjournal_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 150M

  prometheus:
    image: prom/prometheus:latest
    container_name: healthjournal_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-remote-write-receiver"
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    container_name: healthjournal_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
