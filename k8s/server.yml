apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthjournal-server
  namespace: healthjournal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthjournal-server
  template:
    metadata:
      labels:
        app: healthjournal-server
    spec:
      containers:
        - name: server
          image: healthjournal-server:latest
          ports:
            - containerPort: 5500
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: healthjournal-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: healthjournal-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthjournal-secrets
                  key: JWT_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: healthjournal-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthjournal-secrets
                  key: GOOGLE_CLIENT_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5500
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5500
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: healthjournal-server
  namespace: healthjournal
spec:
  selector:
    app: healthjournal-server
  ports:
    - port: 5500
      targetPort: 5500
